name: Build APK with Native
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip -d sdk
          yes | sdk/cmdline-tools/bin/sdkmanager --sdk_root=sdk "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125" > /dev/null 2>&1
          echo "sdk.dir=$PWD/sdk" > local.properties
          echo "ndk.dir=$PWD/sdk/ndk/26.1.10909125" >> local.properties
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.2
      - name: Build APK
        run: gradle assembleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: app/build/outputs/apk/release/*.apk
