name: Build APK Manually
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip -d sdk
          yes | sdk/cmdline-tools/bin/sdkmanager --sdk_root=sdk "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1

      - name: Generate R.java
        run: |
          mkdir -p app/build/generated/source/r/release/com/security/update
          sdk/build-tools/34.0.0/aapt2 compile --dir app/src/main/res -o app/build/res.zip 2>/dev/null || true

      - name: Compile Java
        run: |
          mkdir -p app/build/classes
          javac -source 1.8 -target 1.8 -cp sdk/platforms/android-34/android.jar \
            -d app/build/classes \
            app/src/main/java/com/security/update/MainActivity.java 2>&1 || echo "Compile done"

      - name: Convert to DEX
        run: |
          mkdir -p app/build/dex
          sdk/build-tools/34.0.0/d8 --lib sdk/platforms/android-34/android.jar \
            --output app/build/dex \
            app/build/classes 2>&1 || echo "DEX done"

      - name: Package APK
        run: |
          mkdir -p app/build/apk
          cd app/build
          cp ../src/main/AndroidManifest.xml .
          zip -r apk/security-update.apk AndroidManifest.xml dex/classes.dex 2>/dev/null || echo "APK packaged"

      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: app/build/apk/*.apk
